name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements-bench.txt

      - name: Check formatting with black
        run: python -m black --check actfold tests demo.py scripts

      - name: Check imports with isort
        run: python -m isort --check-only actfold tests demo.py scripts

      - name: Lint with pyflakes
        run: python -m pyflakes actfold tests demo.py scripts

      - name: Type check with mypy
        run: python -m mypy actfold --ignore-missing-imports

      - name: Run fast tests
        run: python -m pytest tests/ -q -m "not slow"

      - name: Run slow tests
        run: python -m pytest tests/ -q -m slow

      - name: Run demo
        run: python demo.py
