# Example: running benchmarks with a real model from the Hugging Face Hub.
# This config uses GPT-2 as a lightweight stand-in for a Diffusion LLM.
# For real Diffusion LLMs, set model_name_or_path to the target checkpoint
# and model_family to one of: llada, dream, fast_dllm, causal_lm.

# Similarity gating
tau: 0.95
metric: "cosine"

# Activation cache
max_entries_per_layer: 1024

# Dynamic threshold scheduling
enable_dynamic_tau: false

# Device and seed
device: "cuda"
seed: 42

# Model architecture (inferred from the loaded checkpoint when possible).
num_layers: 12
hidden_dim: 768
num_heads: 12
seq_len: 128
vocab_size: 50257
num_steps: 10

# Real model configuration.
model_name_or_path: "gpt2"
model_family: "causal_lm"
trust_remote_code: true
use_fast_tokenizer: true
load_in_8bit: false
load_in_4bit: false
torch_dtype: "float32"    # use "float16" or "bfloat16" for faster GPU inference
device_map: null

# Evaluation backend configuration.
# Requires: pip install -r requirements-bench.txt
use_real_eval: true
eval_backend: "auto"
eval_batch_size: 1
eval_num_fewshot: null    # task default
eval_limit: 10           # limit each task to 10 examples for a quick smoke test
eval_base_only: false
